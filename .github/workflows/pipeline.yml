name: Pipeline con Entornos

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: dev   # ← CAMBIAR A prod EN EL PASO 4

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npm test

      - name: Mostrar entorno
        run: echo "Entorno actual:${{ env.ENVIRONMENT }}"

      - name: Paso solo en producción
        if: ${{ env.ENVIRONMENT == 'prod' }}
        run: echo " Desplegando en producción..."

      - name: Notificación éxito
        if: success()
        run: echo " Pipeline correcto"

      - name: Notificación fallo
        if: failure()
        run: echo " Pipeline fallido"
