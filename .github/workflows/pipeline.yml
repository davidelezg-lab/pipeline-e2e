name: Pipeline Multi-Jobs

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - run: npm install

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - run: echo " Deploy ejecutado"
