name: Pipeline con Sonar

on: [push]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npm test

      #  Paso 1 — Sonar (simulado)
      - name: SonarQube Scan
        run: echo "🔎 Análisis de calidad ejecutado"

      #  Paso 2 — Simular fallo de calidad
      - name: Simular fallo de calidad
        id: calidad
        run: exit 1
        continue-on-error: true

      #  Paso 3 — Control del flujo
      - name: Evaluar calidad
        if: steps.calidad.outcome == 'failure'
        run: echo " La calidad ha fallado, pero el pipeline continúa"

      - name: Evaluar calidad OK
        if: steps.calidad.outcome == 'success'
        run: echo " Calidad correcta"

      #  Resultado final (importante para alumnos)
      - name: Resultado final
        run: echo "Pipeline finalizado"
