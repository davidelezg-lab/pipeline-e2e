name: Pipeline Completo PRO

on: [push]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install
        run: npm install

      - name: Test
        run: npm test
        continue-on-error: true

      - name: Sonar
        run: echo "Análisis Sonar"

      - name: Deploy
        if: success()
        run: echo " Deploy OK"

      - name: Notificación éxito
        if: success()
        run: echo " Todo correcto"

      - name: Notificación fallo
        if: failure()
        run: echo " Algo ha fallado"
